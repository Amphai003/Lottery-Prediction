services:
  - type: web
    name: lottery-prediction
    runtime: go
    plan: free # Can be changed to pro or others
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && go build -o ../server"
    startCommand: "./server"
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: lottery-db
          property: connectionString

databases:
  - name: lottery-db
    databaseName: lottery_db
    user: lottery_user
    plan: free
